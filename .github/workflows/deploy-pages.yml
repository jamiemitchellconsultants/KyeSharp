name: Deploy Blazor WASM to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Publish app
        run: dotnet publish KyeSharpWASM/KyeSharpWASM.csproj -c Release -o "$RUNNER_TEMP/publish"

      - name: Prepare static site output
        id: prep
        shell: bash
        run: |
          set -euo pipefail

          PUBLISH_DIR="$RUNNER_TEMP/publish"
          if [ -f "$PUBLISH_DIR/index.html" ]; then
            SITE_DIR="$PUBLISH_DIR"
          else
            SITE_DIR="$PUBLISH_DIR/wwwroot"
          fi

          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          USER_PAGE_REPO="${OWNER}.github.io"

          if [ "$REPO" = "$USER_PAGE_REPO" ]; then
            BASE_HREF="/"
          else
            BASE_HREF="/${REPO}/"
          fi

          sed -i.bak "s|<base href=\"/\" />|<base href=\"${BASE_HREF}\" />|g" "$SITE_DIR/index.html"
          rm -f "$SITE_DIR/index.html.bak"

          cp "$SITE_DIR/index.html" "$SITE_DIR/404.html"
          touch "$SITE_DIR/.nojekyll"

          echo "site_dir=$SITE_DIR" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.prep.outputs.site_dir }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

